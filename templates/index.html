<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Grid Quest - Q-learning</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        .game-info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .status {
            font-size: 18px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            background: #e0e0e0;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }

        .player { background: #4CAF50; color: white; }
        .treasure { background: #FFD700; }
        .wall { background: #333; color: white; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .step-btn { background: #667eea; color: white; }
        .auto-btn { background: #f5576c; color: white; }
        .reset-btn { background: #4facfe; color: white; }

        .graph {
            text-align: center;
            margin-top: 20px;
        }

        .graph img {
            max-width: 100%;
            border-radius: 10px;
        }

        /* 👉 подпись Q-learning */
        .title-bottom {
            text-align: center;
            margin-top: 15px;
            font-size: 26px;
            font-weight: 800;
            color: white;
            text-shadow: 0 3px 10px rgba(0,0,0,0.4);
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🏰 Grid Quest</h1>

    <div class="game-info">
        <div class="status" id="status">Игра началась</div>
        <div id="message">Нажмите автопроход</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button class="step-btn" onclick="makeAgentMove()">Шаг</button>
        <button class="auto-btn" onclick="autoRun()">Автопроход</button>
        <button class="reset-btn" onclick="resetGame()">Сброс</button>
    </div>

    <div class="graph">
        <h3>📊 График обучения</h3>
        <img src="/static/training_plot.png">
    </div>

</div>

<!-- 👉 ВОТ ТВОЯ ПОДПИСЬ -->
<div class="title-bottom">
    Q-LEARNING
</div>

<script>
let currentPosition = [0, 0];
let size = 8;
let treasure = [7,7];

let walls = [
    [1,1],[1,2],[2,1],[3,3],[3,4],
    [4,3],[5,5],[5,6],[6,5],[2,5],
    [2,6],[4,1]
];

let running = false;

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let i=0;i<size;i++) {
        for (let j=0;j<size;j++) {

            let cell = document.createElement('div');
            cell.className = 'cell';

            if (walls.some(w => w[0]==i && w[1]==j)) {
                cell.classList.add('wall');
                cell.textContent = '🧱';
            }
            else if (treasure[0]==i && treasure[1]==j) {
                cell.classList.add('treasure');
                cell.textContent = '💎';
            }
            else if (currentPosition[0]==i && currentPosition[1]==j) {
                cell.classList.add('player');
                cell.textContent = '😊';
            }

            grid.appendChild(cell);
        }
    }
}

async function makeAgentMove() {
    const res = await fetch('/api/agent_move', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({position: currentPosition})
    });

    const data = await res.json();

    if (data.success) {
        currentPosition = data.to;
        renderGrid();
    }
}

async function autoRun() {
    if (running) return;
    running = true;

    const res = await fetch('/api/auto_run', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({position: currentPosition})
    });

    const data = await res.json();

    for (let p of data.path) {
        currentPosition = p;
        renderGrid();
        await new Promise(r => setTimeout(r,150));
    }

    running = false;
}

function resetGame() {
    currentPosition = [0,0];
    renderGrid();
}

window.onload = function () {
    renderGrid();
};
</script>

</body>
</html>
